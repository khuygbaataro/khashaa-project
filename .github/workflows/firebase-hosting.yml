# Auto-deploys the Khashaa frontend to Firebase Hosting on every push to main.
# Setup steps in the repo settings:
#   1. Add a repository secret named FIREBASE_SERVICE_ACCOUNT_UN_PROPERTY containing
#      a service-account JSON with the "Firebase Hosting Admin" role.
#      Easiest way to generate this: from a local clone, run
#         firebase init hosting:github
#      and let it set up the secret for you.
#   2. Add repository secrets for the Vite env vars below — these are baked into
#      the build at compile time. They're public values (web SDK config), so
#      they're safe in the build, but storing them as secrets keeps the workflow
#      portable across forks.
name: Deploy frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths-ignore:
      - "chatbot-server/**"
      - "**.md"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_UN_PROPERTY }}
          channelId: live
          projectId: un-property
